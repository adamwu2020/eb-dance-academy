# Render Blueprint — static site
# Deploy: https://render.com → New → Blueprint → pick this repo
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: eb-dance-academy
    runtime: static
    # Pure HTML/CSS/JS — nothing to build.
    buildCommand: ""
    # Serve the repo root (where index.html lives).
    staticPublishPath: .
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      # Single-page site: send unknown paths back to the homepage.
      - type: rewrite
        source: /*
        destination: /index.html
